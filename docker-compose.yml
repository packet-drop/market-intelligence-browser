version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: info
      PLAYWRIGHT_HEADLESS: "true"
      SERVICE_API_KEY: ${SERVICE_API_KEY:?SERVICE_API_KEY must be set}
      SEEKING_ALPHA_SESSION_PATH: /data/seeking-alpha-session.enc
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - seeking-alpha-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  seeking-alpha-data:
